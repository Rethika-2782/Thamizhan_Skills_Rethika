<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registration</title>

    <!-- Optional font (fallbacks to Arial if unavailable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --primary: #2563eb;
        --accent: #a78bfa;
        --error: #ef4444;
        --success: #22c55e;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(2, 6, 23, 0.12);
        --card-shadow: 0 18px 45px rgba(2, 6, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Poppins", Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: linear-gradient(135deg, #dbeafe 0%, #ede9fe 50%, #e9d5ff 100%);
      }

      .card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 26px 22px;
      }

      .title {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: -0.01em;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .badge {
        width: 12px;
        height: 12px;
        border-radius: 4px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
      }

      form {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 13px;
        color: #334155;
        font-weight: 500;
      }

      input {
        width: 100%;
        height: 42px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 0 12px;
        outline: none;
        background: #ffffff;
        transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
        font-size: 14px;
      }

      input::placeholder {
        color: rgba(100, 116, 139, 0.7);
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
      }

      .msg {
        min-height: 18px; /* reserves space to prevent layout jump */
        font-size: 12.5px;
        line-height: 1.2;
      }

      .msg.error {
        color: var(--error);
      }

      .msg.success {
        color: var(--success);
      }

      button {
        margin-top: 4px;
        width: 100%;
        height: 44px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), #1d4ed8);
        transition: transform 170ms ease, filter 170ms ease, background 170ms ease;
        box-shadow: 0 16px 30px rgba(37, 99, 235, 0.25);
      }

      button:hover {
        transform: translateY(-1px) scale(1.02);
        filter: brightness(0.95);
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
      }

      button:active {
        transform: translateY(0) scale(0.99);
      }

      button:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 4px rgba(167, 139, 250, 0.35),
          0 16px 30px rgba(37, 99, 235, 0.25);
      }

      .form-success {
        display: none;
        margin-top: 2px;
        text-align: center;
        font-size: 13px;
        color: var(--success);
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.22);
      }

      /* Keep it minimal on smaller screens */
      @media (max-width: 420px) {
        .card {
          padding: 22px 16px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card" role="region" aria-label="Student registration form">
      <h1 class="title">
        <span class="badge" aria-hidden="true"></span>
        Student Registration
      </h1>
      <p class="subtitle">Enter your details below. Fields marked with errors must be corrected.</p>

      <form id="registrationForm" novalidate>
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="e.g., Rethika S" autocomplete="name" required />
          <span class="msg error" id="nameError" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="name@example.com"
            autocomplete="email"
            required
          />
          <span class="msg error" id="emailError" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            inputmode="numeric"
            placeholder="10 digits"
            autocomplete="tel"
            required
          />
          <span class="msg error" id="phoneError" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Minimum 6 characters"
            autocomplete="new-password"
            required
          />
          <span class="msg error" id="passwordError" aria-live="polite"></span>
        </div>

        <button type="submit">Register</button>
        <p class="form-success" id="formSuccess" role="status" aria-live="polite"></p>
      </form>
    </div>

    <script>
      const form = document.getElementById("registrationForm");
      const successEl = document.getElementById("formSuccess");

      const fields = {
        name: {
          input: document.getElementById("name"),
          errorEl: document.getElementById("nameError"),
        },
        email: {
          input: document.getElementById("email"),
          errorEl: document.getElementById("emailError"),
        },
        phone: {
          input: document.getElementById("phone"),
          errorEl: document.getElementById("phoneError"),
        },
        password: {
          input: document.getElementById("password"),
          errorEl: document.getElementById("passwordError"),
        },
      };

      function showError(fieldKey, message) {
        const { input, errorEl } = fields[fieldKey];
        errorEl.textContent = message;
        input.setAttribute("aria-invalid", "true");
      }

      function clearError(fieldKey) {
        const { input, errorEl } = fields[fieldKey];
        errorEl.textContent = "";
        input.removeAttribute("aria-invalid");
      }

      function setSuccess(message) {
        successEl.textContent = message;
        successEl.style.display = "block";
      }

      function clearSuccess() {
        successEl.textContent = "";
        successEl.style.display = "none";
      }

      function validateName(name) {
        const v = name.trim();
        if (!v) return "Name is required.";
        if (v.length < 2) return "Name must be at least 2 characters.";
        return "";
      }

      function validateEmail(email) {
        const v = email.trim();
        if (!v) return "Email is required.";
        // Simple, pragmatic email validation
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i;
        if (!re.test(v)) return "Enter a valid email address.";
        return "";
      }

      function validatePhone(phone) {
        const digits = phone.replace(/\D/g, "");
        if (!digits) return "Phone number is required.";
        if (digits.length !== 10) return "Phone number must be exactly 10 digits.";
        return "";
      }

      function validatePassword(password) {
        const v = password;
        if (!v) return "Password is required.";
        if (v.length < 6) return "Password must be at least 6 characters.";
        return "";
      }

      function validateField(fieldKey) {
        const value = fields[fieldKey].input.value;
        let error = "";

        if (fieldKey === "name") error = validateName(value);
        if (fieldKey === "email") error = validateEmail(value);
        if (fieldKey === "phone") error = validatePhone(value);
        if (fieldKey === "password") error = validatePassword(value);

        if (error) showError(fieldKey, error);
        else clearError(fieldKey);

        return !error;
      }

      // Clear success + validate as user types (inline errors)
      Object.keys(fields).forEach((key) => {
        const input = fields[key].input;
        input.addEventListener("input", () => {
          clearSuccess();
          validateField(key);
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        clearSuccess();

        const ok =
          validateField("name") &&
          validateField("email") &&
          validateField("phone") &&
          validateField("password");

        if (!ok) return;

        setSuccess("Registration successful! Your details have been submitted.");
        form.reset();

        // Reset aria-invalid and any leftover errors
        Object.keys(fields).forEach((key) => clearError(key));
      });
    </script>
  </body>
</html>
